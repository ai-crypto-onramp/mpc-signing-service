# cargo-deny configuration (Stage 10). Run: cargo deny check
[advisories]
version = 2
yanked = "deny"
ignore = [
    # rustls-pemfile is unmaintained but pulled transitively by tonic 0.12;
    # no fixed version is available yet. Revisit on the next tonic upgrade.
    "RUSTSEC-2025-0134",
    # rsa v0.9 Marvin Attack (RUSTSEC-2023-0071) — dev-dep only, used by the
    # fireblocks adapter tests to generate RSA-2048 keypairs for JWT signing.
    # No safe upstream fix is available; the rsa crate is never in the
    # production binary (dev-dependency). Revisit when a fixed rsa release
    # lands or switch to a different test keygen crate.
    "RUSTSEC-2023-0071",
]

[bans]
multiple-versions = "warn"
wildcards = "warn"

[licenses]
version = 2
# Permissive licenses acceptable for a funds-handling service; copyleft is
# reviewed case by case (none expected in the dependency tree).
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Zlib",
    "MPL-2.0",
    "CC0-1.0",
    "CDLA-Permissive-2.0",
]
confidence-threshold = 0.9

[sources]
unknown-registry = "deny"
unknown-git = "deny"
